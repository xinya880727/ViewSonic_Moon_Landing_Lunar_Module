<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apollo 11 : Moon Landing</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      
      /* --- 背景圖設定 --- */
      background-image: url('background.png'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #05050a;
      
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
      background-color: transparent;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
      color: white;
      z-index: 10;
      pointer-events: none; 
      text-align: center;
    }
    .header h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .header p {
      margin: 0;
      font-size: 14px;
      color: #e0e0e0;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .ar-button {
      background-color: white;
      color: black;
      border: none;
      border-radius: 50px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: bold;
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .ar-button:active {
      transform: translateX(-50%) scale(0.95);
    }
  </style>
</head>
<body>

  <div class="header">
    <h3>雙指捏合縮放模型，單指拖曳旋轉視角。使用行動裝置點擊下方按鈕，可以開啟 AR 擴增實境，在現實世界中探索登月艙模型！</h3>
  
  </div>

  <model-viewer 
    id="my-viewer"
    alt="我的 3D 模型"
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    disable-pan
    auto-rotate
    camera-orbit="0deg 75deg 100%" 
    max-camera-orbit="auto auto 300%"
    shadow-intensity="1.5"
    environment-image="neutral"
    exposure="1.2">
    
    <button slot="ar-button" class="ar-button" id="ar-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      <span class="btn-text">啟動 AR 模式</span>
    </button>
  </model-viewer>

  <script>
    // ==========================================
    const modelFileName = 'moon_landing.glb';
    const scaleFactor = 0.06;
    // ==========================================

    const viewer = document.getElementById('my-viewer');
    
    // 設定模型路徑
    viewer.src = modelFileName;
    
    // 設定模型縮放大小 (套用 scaleFactor 到 X, Y, Z 三個軸)
    viewer.setAttribute('scale', `${scaleFactor} ${scaleFactor} ${scaleFactor}`);
  </script>

</body>
</html>
